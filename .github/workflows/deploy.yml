name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'gleap-dashboard/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy gleap-dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gleap-dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gleap-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Pages
        run: npm run deploy:ci
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
