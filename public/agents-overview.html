<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Overview — Supy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --p50: #faf5ff; --p100: #f3e8ff; --p200: #e9d5ff;
      --p300: #d8b4fe; --p400: #a78bfa; --p500: #7c3aed;
      --p600: #6b46c1; --p700: #5b21b6; --p800: #4c1d95; --p900: #3b0764;
      --ink: #1A1A2E; --ink2: #4C1D95;
      --muted: #6B7280; --faint: #9CA3AF;
      --border: #E5E3F0; --border2: #D1C4E9;
      --surface: #FFFFFF; --surface2: #F9F8FF; --surface3: #EDE9FE;
      --green: #059669; --amber: #D97706; --red: #DC2626; --blue: #4F46E5;
      --r4: 4px; --r8: 8px; --r12: 12px; --r16: 16px;
      --sh1: 0 1px 3px rgba(107,70,193,0.07);
      --sh2: 0 4px 12px rgba(107,70,193,0.12);
      --font: 'Inter', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--surface2); color: var(--ink); min-height: 100vh; font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

    /* Topbar */
    .topbar {
      background: var(--p900); padding: 0 28px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100; gap: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .back-link {
      font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.55);
      text-decoration: none; display: flex; align-items: center; gap: 5px;
      transition: color 0.15s; white-space: nowrap;
    }
    .back-link:hover { color: rgba(255,255,255,0.9); }
    .topbar-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.12); }
    .page-title { font-size: 15px; font-weight: 700; color: #fff; }
    .topbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .range-btn {
      font-family: var(--font); font-size: 11px; font-weight: 600;
      padding: 5px 12px; border-radius: 99px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: transparent; color: rgba(255,255,255,0.55);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .range-btn:hover { border-color: var(--p300); color: rgba(255,255,255,0.85); background: rgba(167,139,250,0.12); }
    .range-btn.active { border-color: var(--p400); background: rgba(167,139,250,0.2); color: #fff; }
    .date-sep { font-size: 11px; color: rgba(255,255,255,0.35); }
    input[type="date"] {
      font-family: var(--font); font-size: 11px; font-weight: 500; color: var(--ink);
      background: var(--surface); border: 1.5px solid var(--border2);
      border-radius: var(--r8); padding: 5px 9px; outline: none; cursor: pointer;
      transition: border-color 0.15s;
    }
    input[type="date"]:focus { border-color: var(--p500); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
    .btn-apply {
      font-family: var(--font); font-size: 11px; font-weight: 700;
      padding: 5px 14px; border-radius: var(--r8); border: none;
      cursor: pointer; background: var(--p500); color: #fff;
      transition: background 0.15s; white-space: nowrap;
    }
    .btn-apply:hover { background: var(--p600); }

    /* Content */
    .content { padding: 24px 28px; max-width: 1320px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

    /* KPI cards */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    @media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
    .kpi-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r16); padding: 18px 16px;
      position: relative; overflow: hidden; transition: box-shadow 0.15s, transform 0.15s;
    }
    .kpi-card:hover { box-shadow: var(--sh2); transform: translateY(-1px); }
    .kpi-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--p400), var(--p600));
      border-radius: var(--r16) var(--r16) 0 0;
    }
    .kpi-card.green::before { background: linear-gradient(90deg, #34d399, var(--green)); }
    .kpi-card.amber::before { background: linear-gradient(90deg, #fcd34d, var(--amber)); }
    .kpi-card.red::before   { background: linear-gradient(90deg, #f87171, var(--red)); }
    .kpi-value { font-size: 26px; font-weight: 800; color: var(--ink); line-height: 1; }
    .kpi-label { font-size: 10.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

    /* Table card */
    .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r16); overflow: hidden; }
    .table-head { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .table-title { font-size: 13px; font-weight: 700; color: var(--ink); }
    .table-sub { font-size: 11px; color: var(--muted); }

    /* Agent summary table */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.6px; padding: 10px 14px; background: var(--surface2);
      border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap;
    }
    thead th:first-child { width: 36px; text-align: center; padding: 10px 8px; }
    tbody td { padding: 12px 14px; font-size: 12px; color: var(--ink); border-bottom: 1px solid var(--border); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }

    .agent-row { cursor: pointer; transition: background 0.1s; }
    .agent-row:hover td { background: var(--surface2); }
    .agent-row.expanded td { background: var(--p50); }
    .expand-icon { display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--faint); transition: transform 0.2s; user-select: none; }
    .expand-icon.open { transform: rotate(90deg); color: var(--p500); }

    .agent-name-cell { display: flex; align-items: center; gap: 10px; }
    .agent-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--p400), var(--p600));
      color: #fff; font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .agent-avatar.unassigned { background: linear-gradient(135deg, #9CA3AF, #6B7280); }
    .agent-name-text { font-size: 12.5px; font-weight: 600; color: var(--ink); }

    .reply-rate { font-size: 12px; font-weight: 700; }
    .reply-rate.high   { color: var(--green); }
    .reply-rate.medium { color: var(--amber); }
    .reply-rate.low    { color: var(--red); }

    /* Drill-down row */
    .drilldown-row td { padding: 0; border-bottom: 1px solid var(--border); background: var(--surface2); }
    .drilldown-inner {
      border-left: 3px solid var(--p400);
      padding: 16px 20px 20px 24px;
    }
    .drilldown-header {
      font-size: 11px; font-weight: 700; color: var(--p700);
      text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .drilldown-count {
      background: var(--p100); color: var(--p700);
      font-size: 10px; font-weight: 700; padding: 1px 7px;
      border-radius: 99px;
    }
    .drilldown-table-wrap { overflow-x: auto; }
    .drilldown-table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r8); overflow: hidden; }
    .drilldown-table thead th {
      font-size: 9.5px; padding: 8px 12px; background: var(--surface3);
    }
    .drilldown-table tbody td { font-size: 11px; padding: 9px 12px; }
    .drilldown-table tbody tr:hover td { background: var(--p50); }

    /* Badges */
    .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
    .badge.open     { background: rgba(79,70,229,0.1);  color: var(--blue); }
    .badge.closed   { background: rgba(5,150,105,0.1);  color: var(--green); }
    .badge.archived { background: rgba(156,163,175,0.1); color: #6b7280; }
    .badge.done     { background: rgba(5,150,105,0.1);  color: var(--green); }
    .badge.resolved { background: rgba(5,150,105,0.1);  color: var(--green); }
    .badge.pending  { background: rgba(217,119,6,0.1);  color: var(--amber); }
    .badge.unknown  { background: var(--surface3); color: var(--muted); }

    /* Gleap link */
    .gleap-link {
      font-size: 10px; font-weight: 700; color: var(--p600); text-decoration: none;
      padding: 2px 8px; border-radius: 99px; background: var(--p100);
      transition: all 0.15s; display: inline-flex; align-items: center; gap: 3px;
    }
    .gleap-link:hover { background: var(--p200); color: var(--p800); }
    .ticket-title-link {
      font-size: 12px; color: var(--fg); text-decoration: none; display: inline-flex;
      align-items: center; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .ticket-title-link:hover { color: var(--p600); text-decoration: underline; }

    /* Date cell */
    .date-cell { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .date-cell.none { color: var(--faint); font-style: italic; }

    /* Loader & empty */
    .loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px; gap: 14px; color: var(--muted); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--p200); border-top-color: var(--p500); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 12px; font-weight: 500; }
    .loader-sub   { font-size: 11px; color: var(--faint); }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 36px; gap: 8px; color: var(--muted); }
    .empty-text { font-size: 12px; font-weight: 600; }
    .empty-sub  { font-size: 11px; color: var(--faint); }

    /* Inline drill-down spinner */
    .dd-loading { display: flex; align-items: center; gap: 10px; padding: 20px 4px; color: var(--muted); font-size: 11px; font-weight: 500; }
    .dd-spinner { width: 18px; height: 18px; border: 2px solid var(--p200); border-top-color: var(--p500); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }

    /* Error state */
    .error-msg { padding: 16px; font-size: 11px; color: var(--red); font-weight: 500; }

    /* Ticket title in drilldown */
    .ticket-title-cell { font-size: 11.5px; font-weight: 500; color: var(--ink); max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Pipeline section */
    .pipeline-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .pipeline-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r12); padding: 16px 18px;
      border-left: 4px solid var(--p400);
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .pipeline-card:hover { box-shadow: var(--sh2); transform: translateY(-1px); }
    .pipeline-card-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
    }
    .pipeline-card-icon { font-size: 16px; line-height: 1; }
    .pipeline-card-title { font-size: 13px; font-weight: 700; color: var(--ink); }
    .pipeline-stat-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 0; font-size: 12px; border-bottom: 1px solid var(--border);
    }
    .pipeline-stat-row:last-child { border-bottom: none; }
    .pipeline-stat-label { color: var(--muted); font-weight: 500; font-size: 11px; }
    .pipeline-stat-val { font-weight: 700; font-size: 13px; }
    .pipeline-big {
      font-size: 30px; font-weight: 800; line-height: 1; margin-bottom: 4px;
      color: var(--ink);
    }
    .pipeline-big-sub {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--muted); margin-bottom: 12px;
    }

    /* Type breakdown section */
    .section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px;
      color: var(--muted); margin-bottom: 8px; padding: 0 2px;
    }
    .type-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .type-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r12);
      border-top: 3px solid var(--p500); padding: 14px 16px;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .type-card:hover { box-shadow: var(--sh2); transform: translateY(-1px); }
    .type-card-header {
      display: flex; align-items: center; gap: 7px; margin-bottom: 12px;
    }
    .type-icon { font-size: 15px; line-height: 1; }
    .type-label { font-size: 12px; font-weight: 700; color: var(--ink); }
    .type-big-row {
      display: flex; align-items: baseline; gap: 6px; margin-bottom: 10px;
    }
    .type-big-value { font-size: 28px; font-weight: 800; line-height: 1; color: var(--ink); }
    .type-big-sub { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); }
    .type-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
    .type-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 3px 0; font-size: 11px;
    }
    .type-row-label { color: var(--muted); font-weight: 500; }
    .type-row-value { font-size: 12px; font-weight: 700; }
    .days-pill {
      font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 99px;
      white-space: nowrap;
    }
    .days-pill.ok     { background: rgba(5,150,105,0.1);  color: var(--green); }
    .days-pill.warn   { background: rgba(217,119,6,0.1);  color: var(--amber); }
    .days-pill.urgent { background: rgba(220,38,38,0.1);  color: var(--red); }
    .days-pill.none   { background: var(--surface3); color: var(--muted); }

    /* ── Expandable pipeline cards ─────────────────────────────────────────── */
    .pipe-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; }
    .pipe-section-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.7px; color:var(--muted); margin-bottom:8px; padding:0 2px; }
    .pipe-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r12); border-left:4px solid var(--p400); padding:14px 16px; cursor:pointer; transition:box-shadow 0.15s,transform 0.15s; }
    .pipe-card:hover { box-shadow:var(--sh2); transform:translateY(-1px); }
    .pipe-card.active { box-shadow:0 0 0 2px var(--p400); }
    .pipe-card-head { display:flex; align-items:center; gap:7px; margin-bottom:12px; }
    .pipe-card-icon { font-size:15px; line-height:1; }
    .pipe-card-title { font-size:12px; font-weight:700; color:var(--ink); }
    .pipe-card-chevron { transition:transform 0.2s; }
    .pipe-big { font-size:28px; font-weight:800; line-height:1; color:var(--ink); margin-bottom:2px; }
    .pipe-big-sub { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); margin-bottom:10px; }
    .pipe-row { display:flex; align-items:center; justify-content:space-between; padding:4px 0; font-size:11px; border-bottom:1px solid var(--border); }
    .pipe-row:last-child { border-bottom:none; }
    .pipe-row-label { color:var(--muted); font-weight:500; }
    .pipe-row-val { font-weight:700; font-size:12px; }
    .pipe-days-pill { font-size:10px; font-weight:700; padding:1px 7px; border-radius:99px; white-space:nowrap; }
    .pipe-days-pill.ok     { background:rgba(5,150,105,0.1); color:#059669; }
    .pipe-days-pill.warn   { background:rgba(217,119,6,0.1);  color:#D97706; }
    .pipe-days-pill.urgent { background:rgba(220,38,38,0.1);  color:#DC2626; }
    .pipe-days-pill.none   { background:var(--surface3); color:var(--muted); }

    /* ── Pipeline drill-down ──────────────────────────────────────────────── */
    .pipe-drill-table { width:100%; border-collapse:collapse; font-size:11.5px; }
    .pipe-drill-table thead th { padding:8px 14px; text-align:left; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); background:var(--surface2); border-bottom:1px solid var(--border); white-space:nowrap; }
    .pipe-drill-table tbody td { padding:10px 14px; border-bottom:1px solid var(--border); vertical-align:middle; }
    .pipe-drill-table tbody tr:last-child td { border-bottom:none; }
    .pipe-drill-table tbody tr { cursor:pointer; }
    .pipe-drill-table tbody tr:hover td { background:var(--p50); }
    .pipe-drill-id { font-size:10.5px; font-weight:700; color:var(--p600); white-space:nowrap; }
    .pipe-drill-link { color:var(--ink); font-weight:500; max-width:280px; display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .pipe-drill-link:hover { color:var(--p600); }
    .pipe-drill-gleap-btn { background:none; border:1px solid var(--border); border-radius:5px; padding:2px 6px; color:var(--muted); cursor:pointer; font-size:10px; white-space:nowrap; }
    .pipe-drill-gleap-btn:hover { color:var(--p600); border-color:var(--p300); }
    .pipe-drill-tabs { display:flex; gap:2px; padding:12px 16px 0; border-bottom:1px solid var(--border); background:var(--surface2); }
    .pipe-drill-tab { padding:7px 16px; font-size:12px; font-weight:600; border:none; background:none; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent; margin-bottom:-1px; border-radius:6px 6px 0 0; transition:color 0.15s; }
    .pipe-drill-tab:hover { color:var(--ink); }
    .pipe-drill-tab.active { color:var(--p600); border-bottom-color:var(--p500); background:var(--surface); }
    .pipe-drill-tab-count { font-size:10px; font-weight:700; padding:1px 6px; border-radius:99px; margin-left:5px; }
    .pipe-drill-tab-count.pending  { background:rgba(220,38,38,0.1);  color:#DC2626; }
    .pipe-drill-tab-count.resolved { background:rgba(5,150,105,0.1); color:#059669; }
    .pipe-drill-tab-count.all      { background:var(--p100); color:var(--p700); }

    /* ── Ticket detail side panel ─────────────────────────────────────────── */
    #pipeTicketPanel { position:fixed; top:0; right:0; bottom:0; width:360px; background:var(--surface); border-left:1px solid var(--border); box-shadow:-8px 0 32px rgba(0,0,0,0.12); z-index:1100; transform:translateX(100%); transition:transform 0.22s cubic-bezier(0.4,0,0.2,1); overflow-y:auto; display:flex; flex-direction:column; }
    #pipeTicketPanel.open { transform:translateX(0); }
    .ptp-head { padding:16px 18px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; justify-content:space-between; gap:10px; position:sticky; top:0; background:var(--surface); z-index:1; }
    .ptp-title { font-size:13px; font-weight:700; color:var(--ink); line-height:1.4; flex:1; }
    .ptp-close { background:none; border:none; cursor:pointer; color:var(--muted); font-size:18px; line-height:1; padding:2px; flex-shrink:0; }
    .ptp-close:hover { color:var(--ink); }
    .ptp-body { padding:16px 18px; display:flex; flex-direction:column; gap:14px; flex:1; }
    .ptp-row { display:flex; flex-direction:column; gap:3px; }
    .ptp-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); }
    .ptp-val { font-size:12.5px; font-weight:500; color:var(--ink); }
    .ptp-footer { padding:14px 18px; border-top:1px solid var(--border); position:sticky; bottom:0; background:var(--surface); }
    .ptp-gleap-btn { display:flex; align-items:center; gap:6px; justify-content:center; width:100%; padding:9px 14px; border-radius:var(--r8); background:var(--p600); color:#fff; font-size:12px; font-weight:700; text-decoration:none; transition:background 0.15s; }
    .ptp-gleap-btn:hover { background:var(--p700); }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="/" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Dashboard
      </a>
      <div class="topbar-divider"></div>
      <span class="page-title">Agent Overview</span>
    </div>
    <div class="topbar-right">
      <button class="range-btn active" onclick="setQuickRange(7, this)">Last 7 days</button>
      <button class="range-btn" onclick="setQuickRange(30, this)">Last 30 days</button>
      <button class="range-btn" onclick="setQuickRange(90, this)">Last 90 days</button>
      <span class="date-sep">|</span>
      <input type="date" id="dateFrom" />
      <span class="date-sep">→</span>
      <input type="date" id="dateTo" />
      <button class="btn-apply" onclick="applyCustomRange()">Apply</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">

    <!-- KPI Row -->
    <div class="kpi-grid" id="kpiRow">
      <div class="kpi-card"><div class="kpi-value">—</div><div class="kpi-label">Total Agents</div></div>
      <div class="kpi-card green"><div class="kpi-value">—</div><div class="kpi-label">Total Assigned</div></div>
      <div class="kpi-card amber"><div class="kpi-value">—</div><div class="kpi-label">Open Tickets</div></div>
      <div class="kpi-card red"><div class="kpi-value">—</div><div class="kpi-label">Avg Close Time</div></div>
    </div>

    <!-- Ticket Type Breakdown (from Gleap analytics) -->
    <div id="typeSummaryRow"></div>

    <!-- Ticket Pipeline (Bug / Feature Request / Crash moved from Inbox) -->
    <div id="pipelineRow"></div>

    <!-- Agent Table -->
    <div class="table-card">
      <div class="table-head">
        <div>
          <div class="table-title">Agent Summary</div>
          <div class="table-sub" id="tableSubLabel">Select a date range to load data</div>
        </div>
      </div>
      <div id="agentTableWrap">
        <div class="loader">
          <div class="spinner"></div>
          <div class="loader-text">Loading agents…</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    let currentStart = '';
    let currentEnd   = '';
    let expandedAgent = null;
    const loadingAgents = {};

    // ── Helpers ────────────────────────────────────────────────────────────
    function escHtml(s) {
      if (!s) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function sanitizeId(name) {
      return String(name).toLowerCase().replace(/[^a-z0-9]/g, '-');
    }

    function fmtDate(isoStr) {
      if (!isoStr) return null;
      try {
        const d = new Date(isoStr);
        if (isNaN(d)) return null;
        const y = d.getFullYear();
        const mo = String(d.getMonth() + 1).padStart(2, '0');
        const dy = String(d.getDate()).padStart(2, '0');
        const hr = String(d.getHours()).padStart(2, '0');
        const mn = String(d.getMinutes()).padStart(2, '0');
        return `${y}-${mo}-${dy} ${hr}:${mn}`;
      } catch { return null; }
    }

    function safeUrl(u) {
      try {
        const p = new URL(u);
        return (p.protocol === 'https:' || p.protocol === 'http:') ? u : '#';
      } catch { return '#'; }
    }

    function statusBadge(status) {
      if (!status) return '<span class="badge unknown">unknown</span>';
      const s = status.toLowerCase();
      const map = {
        open: 'open', closed: 'closed', done: 'done',
        resolved: 'resolved', archived: 'archived', pending: 'pending',
        in_progress: 'open', inprogress: 'open', active: 'open',
      };
      const cls = map[s] || 'unknown';
      return `<span class="badge ${cls}">${escHtml(status)}</span>`;
    }

    function avatarInitials(name) {
      const parts = String(name || '?').trim().split(/\s+/);
      if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
      return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
    }

    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function daysAgoStr(n) {
      const d = new Date();
      d.setDate(d.getDate() - n + 1);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    // ── Date range controls ────────────────────────────────────────────────
    function initDateRange() {
      currentStart = daysAgoStr(7);
      currentEnd   = todayStr();
      document.getElementById('dateFrom').value = currentStart;
      document.getElementById('dateTo').value   = currentEnd;
      loadAgents();
    }

    function setQuickRange(days, btn) {
      document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      currentStart = daysAgoStr(days);
      currentEnd   = todayStr();
      document.getElementById('dateFrom').value = currentStart;
      document.getElementById('dateTo').value   = currentEnd;
      loadAgents();
    }

    function applyCustomRange() {
      const from = document.getElementById('dateFrom').value;
      const to   = document.getElementById('dateTo').value;
      if (!from || !to) { alert('Please select both start and end dates.'); return; }
      if (from > to) { alert('Start date must be before end date.'); return; }
      document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
      currentStart = from;
      currentEnd   = to;
      loadAgents();
    }

    // ── Load agents (analytics endpoint) ──────────────────────────────────
    async function loadAgents() {
      collapseCurrentDrilldown();

      document.getElementById('agentTableWrap').innerHTML = `
        <div class="loader">
          <div class="spinner"></div>
          <div class="loader-text">Loading agents…</div>
          <div class="loader-sub">Fetching data for ${escHtml(currentStart)} → ${escHtml(currentEnd)}</div>
        </div>`;

      // Load pipeline in parallel — non-blocking, fails silently
      loadPipeline();

      try {
        const url = `/api/analytics?start=${encodeURIComponent(currentStart + 'T00:00:00.000Z')}&end=${encodeURIComponent(currentEnd + 'T23:59:59.999Z')}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'API error');

        const stats = data.stats;
        renderSummaryKPIs(stats);
        renderTypeSummary(stats);
        renderAgentTable(stats.agents || []);

        const total = (stats.agents || []).filter(a => a.name !== 'Unassigned').length;
        document.getElementById('tableSubLabel').textContent =
          `${total} agent${total !== 1 ? 's' : ''} · ${escHtml(currentStart)} to ${escHtml(currentEnd)}`;

      } catch (err) {
        document.getElementById('agentTableWrap').innerHTML = `
          <div class="loader">
            <div class="error-msg">Failed to load agents: ${escHtml(err.message)}</div>
          </div>`;
        document.getElementById('tableSubLabel').textContent = 'Error loading data';
        document.getElementById('typeSummaryRow').innerHTML = '';
        document.getElementById('pipelineRow').innerHTML = '';
      }
    }

    // ── Ticket pipeline (non-INQUIRY types: Bug, Feature Request, Crash…) ──
    const PIPE_META = {
      BUG:                  { label: 'Bug',                  icon: '🐛', color: '#DC2626' },
      FEATURE_REQUEST:      { label: 'Feature Request',      icon: '✨', color: '#059669' },
      CRASH:                { label: 'Crash',                icon: '💥', color: '#D97706' },
      ANALYTICS:            { label: 'Analytics',            icon: '📊', color: '#4F46E5' },
      EXINTEGRATIONS:       { label: 'Integrations',         icon: '🔗', color: '#7C3AED' },
      'QA-BACKLOG':         { label: 'QA Backlog',           icon: '🔍', color: '#6B7280' },
      'CUSTOMER-OPERATIONS':{ label: 'Customer Operations',  icon: '🤝', color: '#0891B2' },
    };
    const PRIORITY_COLOR = { HIGH:'#DC2626', MEDIUM:'#D97706', LOW:'#059669', CRITICAL:'#7C3AED' };
    const STATUS_COLOR   = { CLOSED:'#059669',DONE:'#059669',RESOLVED:'#059669',COMPLETED:'#059669',OPEN:'#D97706',IN_PROGRESS:'#4F46E5',PENDING:'#D97706' };
    let _pipelineData    = {};
    let _activeExpandType = null;

    async function loadPipeline() {
      const el = document.getElementById('pipelineRow');
      el.innerHTML = '';
      try {
        const url = `/api/pipeline?start=${encodeURIComponent(currentStart + 'T00:00:00.000Z')}&end=${encodeURIComponent(currentEnd + 'T23:59:59.999Z')}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'API error');
        renderOverviewPipeline(data.categories || []);
      } catch(err) {
        console.warn('Pipeline load failed:', err.message);
      }
    }

    function renderOverviewPipeline(categories) {
      const el = document.getElementById('pipelineRow');
      if (!el) return;
      if (!categories.length) { el.innerHTML = ''; return; }

      _pipelineData = {};
      categories.forEach(c => { _pipelineData[c.type] = c; });

      const cards = categories.map(cat => {
        const meta         = PIPE_META[cat.type] || { label: cat.type.replace(/_/g,' '), icon:'📋', color:'var(--p500)' };
        const pendingColor = cat.open === 0 ? '#059669' : cat.open > 5 ? '#DC2626' : '#D97706';
        const avgD         = cat.avgDaysOpen;
        const avgCls       = avgD === null ? 'none' : avgD > 7 ? 'urgent' : avgD > 3 ? 'warn' : 'ok';
        const pct          = cat.total ? Math.round((cat.resolved / cat.total) * 100) : 0;
        return `
          <div class="pipe-card" id="pipe-card-${cat.type}" style="border-left-color:${meta.color}" data-pipetype="${cat.type}">
            <div class="pipe-card-head">
              <span class="pipe-card-icon">${meta.icon}</span>
              <span class="pipe-card-title">${escHtml(meta.label)}</span>
              <svg class="pipe-card-chevron" width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="margin-left:auto;opacity:0.4;flex-shrink:0;transition:transform 0.2s"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
            </div>
            <div class="pipe-big">${cat.total}</div>
            <div class="pipe-big-sub">moved from inbox</div>
            <div class="pipe-row">
              <span class="pipe-row-label">Pending</span>
              <span class="pipe-row-val" style="color:${pendingColor}">${cat.open}</span>
            </div>
            <div class="pipe-row">
              <span class="pipe-row-label">Resolved</span>
              <span class="pipe-row-val" style="color:#059669">${cat.resolved} <span style="font-size:10px;color:var(--muted)">(${pct}%)</span></span>
            </div>
            <div class="pipe-row">
              <span class="pipe-row-label">Avg open</span>
              <span class="pipe-days-pill ${avgCls}">${avgD !== null ? avgD+'d' : '—'}</span>
            </div>
            <div class="pipe-row">
              <span class="pipe-row-label">Max open</span>
              <span class="pipe-row-val" style="color:${(cat.maxDaysOpen||0)>7?'#DC2626':'var(--muted)'}">${cat.maxDaysOpen !== null ? cat.maxDaysOpen+'d' : '—'}</span>
            </div>
          </div>`;
      }).join('');

      el.innerHTML = `
        <div class="pipe-section-label">Tickets moved from Inbox → Pipeline</div>
        <div class="pipe-grid" id="pipeCardGrid">${cards}</div>
        <div id="pipeExpandPanel" style="display:none;margin-top:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r12);overflow:hidden"></div>`;
    }

    function _pipeTicketRow(t, showDays, type) {
      const updated   = t.updatedAt ? new Date(t.updatedAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—';
      const daysVal   = showDays && t.daysOpen !== null ? t.daysOpen : null;
      const daysTag   = daysVal !== null
        ? `<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;background:${daysVal>7?'rgba(220,38,38,0.1)':daysVal>3?'rgba(217,119,6,0.1)':'rgba(5,150,105,0.1)'};color:${daysVal>7?'#DC2626':daysVal>3?'#D97706':'#059669'}">${daysVal}d</span>`
        : `<span style="color:var(--faint);font-size:11px">—</span>`;
      const priColor  = PRIORITY_COLOR[t.priority] || 'var(--muted)';
      const stColor   = STATUS_COLOR[t.status]     || 'var(--muted)';
      const replies   = t.agentResponseCount || 0;
      const customer  = escHtml(t.contact || t.company || '—');
      const safeLink  = /^https?:\/\//i.test(t.gleapLink||'') ? t.gleapLink : null;
      const gleapBtn  = safeLink ? `<button class="pipe-drill-gleap-btn" data-href="${escHtml(safeLink)}" title="Open in Gleap">&#x2197;</button>` : '';
      const origIdx   = t._origIdx !== undefined ? t._origIdx : '';
      return `<tr data-ticket-type="${escHtml(type)}" data-ticket-idx="${origIdx}" style="cursor:pointer">
        <td><span class="pipe-drill-id">#${escHtml(String(t.bugId||t.id||''))}</span></td>
        <td style="max-width:260px"><span class="pipe-drill-link" title="${escHtml(t.title||'')}">${escHtml(t.title||'—')}</span></td>
        <td><span style="font-size:11px;color:var(--muted)">${customer}</span></td>
        <td style="text-align:center">${daysTag}</td>
        <td><span style="font-size:10px;font-weight:700;color:${stColor}">${t.status||'—'}</span></td>
        <td><span style="font-size:10px;font-weight:700;color:${priColor}">${t.priority||'—'}</span></td>
        <td><span style="font-size:11px;color:var(--muted)">${escHtml(t.agent||'—')}</span></td>
        <td><span style="font-size:11px;color:var(--muted)">${updated}</span></td>
        <td style="text-align:center"><span style="font-size:11px;font-weight:600;color:${replies>0?'var(--p600)':'var(--faint)'}">${replies}</span></td>
        <td style="text-align:center">${gleapBtn}</td>
      </tr>`;
    }

    function _pipeTicketTable(tickets, showDays, type) {
      if (!tickets.length) return `<div style="padding:32px;text-align:center;color:var(--muted);font-size:12px">No tickets in this view.</div>`;
      return `<div style="overflow-x:auto"><table class="pipe-drill-table" style="min-width:820px">
        <thead><tr>
          <th>ID</th><th>Title</th><th>Customer / Company</th><th style="text-align:center">Days open</th><th>Status</th><th>Priority</th><th>Assigned to</th><th>Last updated</th><th style="text-align:center">Replies</th><th></th>
        </tr></thead>
        <tbody>${tickets.map(t => _pipeTicketRow(t, showDays, type)).join('')}</tbody>
      </table></div>`;
    }

    function togglePipeExpand(type) {
      const panel = document.getElementById('pipeExpandPanel');
      if (_activeExpandType === type) {
        _activeExpandType = null;
        panel.style.display = 'none';
        document.querySelectorAll('.pipe-card').forEach(c => {
          c.classList.remove('active');
          const chev = c.querySelector('.pipe-card-chevron');
          if (chev) chev.style.transform = '';
        });
        return;
      }
      _activeExpandType = type;
      document.querySelectorAll('.pipe-card').forEach(c => {
        const isActive = c.id === `pipe-card-${type}`;
        c.classList.toggle('active', isActive);
        const chev = c.querySelector('.pipe-card-chevron');
        if (chev) chev.style.transform = isActive ? 'rotate(180deg)' : '';
      });

      const cat     = _pipelineData[type];
      const meta    = PIPE_META[type] || { label: type.replace(/_/g,' '), icon:'📋', color:'var(--p500)' };
      // Tag each ticket with its original index so the delegated click handler can
      // look it up from _pipelineData without serialising data into HTML attributes.
      const tickets  = (cat.tickets || []).map((t, i) => Object.assign({}, t, { _origIdx: i }));
      const pending  = tickets.filter(t => t.isOpen);
      const resolved = tickets.filter(t => t.isClosed);

      panel.style.display = '';
      panel.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface2)">
          <div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--ink)">
            <span style="font-size:16px">${meta.icon}</span> ${escHtml(meta.label)}
            <span style="font-size:11px;font-weight:500;color:var(--muted)">${cat.total} ticket${cat.total!==1?'s':''}</span>
          </div>
          <button data-pipetype="${type}" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;padding:2px">&#x2715;</button>
        </div>
        <div class="pipe-drill-tabs" style="background:var(--surface)">
          <button class="pipe-drill-tab active" data-tab="pending" onclick="switchPipeTab('pending')">
            Pending / Open <span class="pipe-drill-tab-count pending">${pending.length}</span>
          </button>
          <button class="pipe-drill-tab" data-tab="resolved" onclick="switchPipeTab('resolved')">
            Resolved / Closed <span class="pipe-drill-tab-count resolved">${resolved.length}</span>
          </button>
          <button class="pipe-drill-tab" data-tab="all" onclick="switchPipeTab('all')">
            All <span class="pipe-drill-tab-count all">${tickets.length}</span>
          </button>
        </div>
        <div class="pipe-drill-pane" data-tab="pending">${_pipeTicketTable(pending, true, type)}</div>
        <div class="pipe-drill-pane" data-tab="resolved" style="display:none">${_pipeTicketTable(resolved, false, type)}</div>
        <div class="pipe-drill-pane" data-tab="all" style="display:none">${_pipeTicketTable(tickets, true, type)}</div>`;

      panel.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }

    function switchPipeTab(tab) {
      document.querySelectorAll('#pipeExpandPanel .pipe-drill-tab').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
      document.querySelectorAll('#pipeExpandPanel .pipe-drill-pane').forEach(el => el.style.display = el.dataset.tab === tab ? '' : 'none');
    }

    function openPipeTicket(t) {
      const stColor  = STATUS_COLOR[t.status]    || 'var(--muted)';
      const priColor = PRIORITY_COLOR[t.priority] || 'var(--muted)';
      const created  = t.createdAt ? new Date(t.createdAt).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
      const updated  = t.updatedAt ? new Date(t.updatedAt).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
      const closed   = t.closeAt   ? new Date(t.closeAt).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : null;

      document.getElementById('ptpTitle').textContent = t.title || '(No title)';
      document.getElementById('ptpBody').innerHTML = `
        <div class="ptp-row"><div class="ptp-label">Ticket ID</div><div class="ptp-val" style="color:var(--p600);font-weight:700">#${escHtml(String(t.bugId||t.id||''))}</div></div>
        <div class="ptp-row"><div class="ptp-label">Status</div><div class="ptp-val"><span style="font-weight:700;color:${stColor}">${t.status||'—'}</span></div></div>
        <div class="ptp-row"><div class="ptp-label">Priority</div><div class="ptp-val"><span style="font-weight:700;color:${priColor}">${t.priority||'—'}</span></div></div>
        <div class="ptp-row"><div class="ptp-label">Customer</div><div class="ptp-val">${escHtml(t.contact||'—')}</div></div>
        <div class="ptp-row"><div class="ptp-label">Company</div><div class="ptp-val">${escHtml(t.company||'—')}</div></div>
        <div class="ptp-row"><div class="ptp-label">Assigned to</div><div class="ptp-val">${escHtml(t.agent||'Unassigned')}</div></div>
        <div class="ptp-row"><div class="ptp-label">Agent replies</div><div class="ptp-val" style="font-weight:700;color:${(t.agentResponseCount||0)>0?'var(--p600)':'var(--muted)'}">${t.agentResponseCount||0}</div></div>
        <div class="ptp-row"><div class="ptp-label">Created</div><div class="ptp-val">${created}</div></div>
        <div class="ptp-row"><div class="ptp-label">Last updated</div><div class="ptp-val">${updated}</div></div>
        ${t.daysOpen !== null ? `<div class="ptp-row"><div class="ptp-label">Days open</div><div class="ptp-val"><span style="font-weight:700;color:${t.daysOpen>7?'#DC2626':t.daysOpen>3?'#D97706':'#059669'}">${t.daysOpen} day${t.daysOpen!==1?'s':''}</span></div></div>` : ''}
        ${closed ? `<div class="ptp-row"><div class="ptp-label">Closed on</div><div class="ptp-val">${closed}</div></div>` : ''}`;

      const safeGleapLink = /^https?:\/\//i.test(t.gleapLink||'') ? t.gleapLink : null;
      const footer = document.getElementById('ptpFooter');
      footer.innerHTML = '';
      if (safeGleapLink) {
        const a = document.createElement('a');
        a.className = 'ptp-gleap-btn';
        a.href      = safeGleapLink;
        a.target    = '_blank';
        a.rel       = 'noopener';
        a.innerHTML = `<svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg> Open in Gleap`;
        footer.appendChild(a);
      } else {
        const d = document.createElement('div');
        d.style.cssText = 'text-align:center;font-size:11px;color:var(--muted)';
        d.textContent = 'No Gleap link available';
        footer.appendChild(d);
      }

      document.getElementById('pipeTicketPanel').classList.add('open');
    }

    function closePipeTicket() {
      document.getElementById('pipeTicketPanel').classList.remove('open');
    }

    // ── Ticket type breakdown ──────────────────────────────────────────────
    const TYPE_META = {
      INQUIRY:         { label: 'Inquiry',         icon: '💬', color: 'var(--blue)' },
      BUG:             { label: 'Bug',              icon: '🐛', color: 'var(--red)'  },
      FEATURE_REQUEST: { label: 'Feature Request',  icon: '✨', color: 'var(--green)'},
      CRASH:           { label: 'Crash',            icon: '💥', color: 'var(--amber)'},
      UNKNOWN:         { label: 'Unknown',          icon: '❓', color: 'var(--muted)'},
    };

    function renderTypeSummary(stats) {
      const el = document.getElementById('typeSummaryRow');
      const openTickets = stats.openTickets || [];
      const now = Date.now();

      // Seed from typeBreakdown (total counts per type)
      const typeMap = {};
      (stats.typeBreakdown || []).forEach(({ type, count }) => {
        typeMap[type] = { type, total: count, open: 0, daysOpen: [] };
      });

      // Augment with days-open data from open tickets
      openTickets.forEach(t => {
        const tp = t.gleapType || 'UNKNOWN';
        if (!typeMap[tp]) typeMap[tp] = { type: tp, total: 0, open: 0, daysOpen: [] };
        typeMap[tp].open++;
        if (t.createdAt) {
          const days = Math.floor((now - new Date(t.createdAt)) / 86400000);
          typeMap[tp].daysOpen.push(Math.max(0, days));
        }
      });

      const types = Object.values(typeMap).filter(t => t.total > 0)
        .sort((a, b) => b.total - a.total);

      if (!types.length) { el.innerHTML = ''; return; }

      function daysPill(avg) {
        if (avg === null) return `<span class="days-pill none">—</span>`;
        const cls = avg > 7 ? 'urgent' : avg > 3 ? 'warn' : 'ok';
        return `<span class="days-pill ${cls}">${avg.toFixed(1)}d avg</span>`;
      }

      const cards = types.map(td => {
        const meta = TYPE_META[td.type] || { label: td.type, icon: '📋', color: 'var(--muted)' };
        const avgDays = td.daysOpen.length
          ? td.daysOpen.reduce((s, d) => s + d, 0) / td.daysOpen.length
          : null;
        const maxDays = td.daysOpen.length ? Math.max(...td.daysOpen) : null;
        const openColor = td.open === 0 ? 'var(--green)' : td.open > 5 ? 'var(--red)' : 'var(--amber)';

        return `
          <div class="type-card" style="border-top-color:${meta.color}">
            <div class="type-card-header">
              <span class="type-icon">${meta.icon}</span>
              <span class="type-label">${escHtml(meta.label)}</span>
            </div>
            <div class="type-big-row">
              <span class="type-big-value">${td.total}</span>
              <span class="type-big-sub">total</span>
            </div>
            <hr class="type-divider">
            <div class="type-row">
              <span class="type-row-label">Pending / Open</span>
              <span class="type-row-value" style="color:${openColor}">${td.open}</span>
            </div>
            <div class="type-row">
              <span class="type-row-label">Avg days open</span>
              ${daysPill(avgDays)}
            </div>
            ${maxDays !== null ? `
            <div class="type-row">
              <span class="type-row-label">Longest open</span>
              <span class="type-row-value" style="color:${maxDays > 7 ? 'var(--red)' : 'var(--muted)'}">${maxDays}d</span>
            </div>` : ''}
          </div>`;
      }).join('');

      el.innerHTML = `
        <div class="section-label">Tickets by Category</div>
        <div class="type-grid">${cards}</div>`;
    }

    // ── KPI cards ──────────────────────────────────────────────────────────
    function renderSummaryKPIs(stats) {
      const agents = (stats.agents || []).filter(a => a.name !== 'Unassigned');
      const totalHandled = agents.reduce((s, a) => s + (a.handled || 0), 0);
      const totalOpen    = agents.reduce((s, a) => s + (a.open    || 0), 0);

      document.getElementById('kpiRow').innerHTML = `
        <div class="kpi-card">
          <div class="kpi-value">${agents.length}</div>
          <div class="kpi-label">Total Agents</div>
        </div>
        <div class="kpi-card green">
          <div class="kpi-value">${totalHandled}</div>
          <div class="kpi-label">Total Assigned</div>
        </div>
        <div class="kpi-card amber">
          <div class="kpi-value">${totalOpen}</div>
          <div class="kpi-label">Open Tickets</div>
        </div>
        <div class="kpi-card red">
          <div class="kpi-value">${escHtml(stats.avgCloseFmt || '—')}</div>
          <div class="kpi-label">Avg Close Time</div>
        </div>`;
    }

    // ── Agent summary table ────────────────────────────────────────────────
    function renderAgentTable(agents) {
      if (!agents.length) {
        document.getElementById('agentTableWrap').innerHTML = `
          <div class="empty-state">
            <div class="empty-text">No agents found</div>
            <div class="empty-sub">No ticket data for the selected date range.</div>
          </div>`;
        return;
      }

      // Sort: named agents first (alphabetical), Unassigned last
      const sorted = [...agents].sort((a, b) => {
        if (a.name === 'Unassigned') return 1;
        if (b.name === 'Unassigned') return -1;
        return a.name.localeCompare(b.name);
      });

      const rows = sorted.map(a => {
        const sid = sanitizeId(a.name);
        const isUnassigned = a.name === 'Unassigned';
        const rr = a.replyRate || 0;
        const rrClass = rr >= 85 ? 'high' : rr >= 50 ? 'medium' : 'low';

        return `
          <tr class="agent-row" id="agent-row-${escHtml(sid)}" data-agent="${escHtml(a.name)}">
            <td style="text-align:center;padding:12px 8px;">
              <span class="expand-icon" id="expand-icon-${escHtml(sid)}">▶</span>
            </td>
            <td>
              <div class="agent-name-cell">
                <div class="agent-avatar${isUnassigned ? ' unassigned' : ''}">${escHtml(avatarInitials(a.name))}</div>
                <span class="agent-name-text">${escHtml(a.name)}</span>
              </div>
            </td>
            <td><strong>${a.handled || 0}</strong></td>
            <td style="color:var(--blue);font-weight:600;">${a.open || 0}</td>
            <td style="color:var(--green);font-weight:600;">${a.closed || 0}</td>
            <td><span class="reply-rate ${rrClass}">${rr}%</span></td>
            <td style="color:var(--muted);">${escHtml(a.avgCloseFmt || '—')}</td>
          </tr>`;
      }).join('');

      document.getElementById('agentTableWrap').innerHTML = `
        <table>
          <thead>
            <tr>
              <th></th>
              <th>Agent</th>
              <th>Total Assigned</th>
              <th>Open</th>
              <th>Closed</th>
              <th>Reply Rate</th>
              <th>Avg Close Time</th>
            </tr>
          </thead>
          <tbody id="agentTbody">${rows}</tbody>
        </table>`;

      // Attach click handlers via addEventListener — agent names stay as JS values,
      // never injected into an attribute code string.
      document.querySelectorAll('#agentTbody .agent-row').forEach(row => {
        row.addEventListener('click', () => toggleDrillDown(row.dataset.agent));
      });
    }

    // ── Drill-down toggle ──────────────────────────────────────────────────
    function collapseCurrentDrilldown() {
      if (!expandedAgent) return;
      const sid = sanitizeId(expandedAgent);
      const ddRow = document.getElementById(`drilldown-row-${sid}`);
      if (ddRow) ddRow.remove();
      const agentRow = document.getElementById(`agent-row-${sid}`);
      if (agentRow) agentRow.classList.remove('expanded');
      const icon = document.getElementById(`expand-icon-${sid}`);
      if (icon) { icon.textContent = '▶'; icon.classList.remove('open'); }

      // Cancel any in-flight fetch
      if (loadingAgents[expandedAgent]) {
        loadingAgents[expandedAgent].abort();
        delete loadingAgents[expandedAgent];
      }
      expandedAgent = null;
    }

    function toggleDrillDown(agentName) {
      // If this agent is already expanded, collapse it
      if (expandedAgent === agentName) {
        collapseCurrentDrilldown();
        return;
      }

      // Collapse any other open drill-down first
      collapseCurrentDrilldown();

      const sid = sanitizeId(agentName);
      const agentRow = document.getElementById(`agent-row-${sid}`);
      if (!agentRow) return;

      // Create drill-down row
      const ddRow = document.createElement('tr');
      ddRow.className = 'drilldown-row';
      ddRow.id = `drilldown-row-${sid}`;
      ddRow.innerHTML = `
        <td colspan="8">
          <div class="drilldown-inner">
            <div class="dd-loading">
              <div class="dd-spinner"></div>
              Fetching tickets for <strong style="margin-left:4px;">${escHtml(agentName)}</strong>… this may take a moment.
            </div>
          </div>
        </td>`;

      agentRow.insertAdjacentElement('afterend', ddRow);
      agentRow.classList.add('expanded');

      const icon = document.getElementById(`expand-icon-${sid}`);
      if (icon) { icon.textContent = '▶'; icon.classList.add('open'); }

      expandedAgent = agentName;
      loadAgentTickets(agentName);
    }

    // ── Load tickets for an agent ──────────────────────────────────────────
    async function loadAgentTickets(agentName) {
      const controller = new AbortController();
      loadingAgents[agentName] = controller;

      try {
        const url = `/api/tickets?agent=${encodeURIComponent(agentName)}&start=${encodeURIComponent(currentStart + 'T00:00:00.000Z')}&end=${encodeURIComponent(currentEnd + 'T23:59:59.999Z')}&limit=100`;
        const res = await fetch(url, { signal: controller.signal });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        renderDrillDown(agentName, data.tickets || []);
      } catch (err) {
        if (err.name === 'AbortError') return;
        const sid = sanitizeId(agentName);
        const ddRow = document.getElementById(`drilldown-row-${sid}`);
        if (!ddRow) return;
        ddRow.querySelector('.drilldown-inner').innerHTML = `
          <div class="error-msg">Failed to load tickets: ${escHtml(err.message)}</div>`;
      } finally {
        delete loadingAgents[agentName];
      }
    }

    // ── Render drill-down ticket sub-table ─────────────────────────────────
    function renderDrillDown(agentName, tickets) {
      const sid = sanitizeId(agentName);
      const ddRow = document.getElementById(`drilldown-row-${sid}`);
      if (!ddRow) return; // date range changed while loading

      const inner = ddRow.querySelector('.drilldown-inner');

      if (!tickets.length) {
        inner.innerHTML = `
          <div class="drilldown-header">
            Tickets for ${escHtml(agentName)}
            <span class="drilldown-count">0</span>
          </div>
          <div class="empty-state" style="padding:20px 0;">
            <div class="empty-text">No tickets found</div>
            <div class="empty-sub">No tickets for this agent in the selected date range.</div>
          </div>`;
        return;
      }

      const rows = tickets.map(t => {
        const created  = fmtDate(t.createdAt);
        const assigned = fmtDate(t.firstAssignAt);
        const closed   = fmtDate(t.closeAt);
        const assignee = t.agent && t.agent !== 'Unassigned' ? escHtml(t.agent) : '';

        return `
          <tr>
            <td>
              ${t.gleapLink
                ? `<a class="gleap-link" href="${escHtml(safeUrl(t.gleapLink))}" target="_blank" rel="noopener">#${escHtml(String(t.bugId || t.id || ''))}</a>`
                : `<span style="font-size:11px;color:var(--muted);">#${escHtml(String(t.bugId || t.id || ''))}</span>`
              }
            </td>
            <td>
              ${t.gleapLink
                ? `<a class="ticket-title-link" href="${escHtml(safeUrl(t.gleapLink))}" target="_blank" rel="noopener" title="${escHtml(t.title)}">${escHtml(t.title || '—')}<svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="margin-left:4px;opacity:0.5;flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg></a>`
                : `<span class="ticket-title-cell" title="${escHtml(t.title)}">${escHtml(t.title || '—')}</span>`
              }
            </td>
            <td><span class="date-cell${!created ? ' none' : ''}">${created || '—'}</span></td>
            <td>
              <span class="date-cell${!assigned ? ' none' : ''}">${assigned || '—'}</span>
              ${assignee ? `<span style="display:block;font-size:10px;color:var(--muted);margin-top:2px;">→ ${assignee}</span>` : ''}
            </td>
            <td><span class="date-cell${!closed ? ' none' : ''}">${closed || '—'}</span></td>
            <td style="text-align:center;font-size:12px;font-weight:600;color:${(t.agentResponseCount||0)>0?'var(--p600)':'var(--faint)'};">${t.agentResponseCount || 0}</td>
            <td>${statusBadge(t.status)}</td>
          </tr>`;
      }).join('');

      inner.innerHTML = `
        <div class="drilldown-header">
          Tickets for ${escHtml(agentName)}
          <span class="drilldown-count">${tickets.length}${tickets.length === 100 ? '+' : ''}</span>
        </div>
        <div class="drilldown-table-wrap">
          <table class="drilldown-table">
            <thead>
              <tr>
                <th>Ticket ID</th>
                <th>Title</th>
                <th title="When the customer opened the ticket">Created</th>
                <th title="When an agent first responded (first agent reply time — Gleap does not store a separate assignment timestamp)">Assigned ↓ Agent</th>
                <th title="When the ticket was last updated in a closed status (proxy for close time)">Closed</th>
                <th title="Total messages exchanged on this ticket (customer + agent)">Messages</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    // ── Init ───────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      initDateRange();

      // Event delegation for pipeline cards, ticket rows, and gleap buttons
      document.addEventListener('click', function(e) {
        // Gleap external link button — open without serialising URL into HTML
        const gleapBtn = e.target.closest('.pipe-drill-gleap-btn');
        if (gleapBtn && gleapBtn.dataset.href) {
          e.stopPropagation();
          window.open(gleapBtn.dataset.href, '_blank', 'noopener');
          return;
        }

        // Ticket table row → open side panel by index lookup (no data in HTML)
        const ticketRow = e.target.closest('tr[data-ticket-type][data-ticket-idx]');
        if (ticketRow) {
          const type = ticketRow.dataset.ticketType;
          const idx  = parseInt(ticketRow.dataset.ticketIdx, 10);
          const t    = (_pipelineData[type] || {}).tickets?.[idx];
          if (t) openPipeTicket(t);
          return;
        }

        // Expand panel close button
        const closeBtn = e.target.closest('#pipeExpandPanel button[data-pipetype]');
        if (closeBtn) {
          togglePipeExpand(closeBtn.dataset.pipetype);
          return;
        }

        // Pipeline card click → expand
        const pipeEl = e.target.closest('[data-pipetype].pipe-card');
        if (pipeEl) {
          togglePipeExpand(pipeEl.dataset.pipetype);
        }
      });
    });
  </script>

  <!-- Ticket detail side panel -->
  <div id="pipeTicketPanel">
    <div class="ptp-head">
      <div class="ptp-title" id="ptpTitle"></div>
      <button class="ptp-close" onclick="closePipeTicket()">&#x2715;</button>
    </div>
    <div class="ptp-body" id="ptpBody"></div>
    <div class="ptp-footer" id="ptpFooter"></div>
  </div>
</body>
</html>
