<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supy Inbox Intelligence — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .logo {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }

    h1 {
      color: #f1f5f9;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 20px;
      background: #fff;
      color: #1e293b;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-google:hover { background: #f1f5f9; transform: translateY(-1px); }
    .btn-google:active { transform: translateY(0); }

    .btn-google svg { flex-shrink: 0; }

    .restriction {
      margin-top: 20px;
      color: #64748b;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .restriction::before { content: ''; display:inline-flex; }

    .error-box {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      color: #fca5a5;
      font-size: 0.85rem;
      padding: 12px 16px;
      margin-bottom: 24px;
      display: none;
    }

    .error-box.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📊</div>
    <h1>Supy Inbox Intelligence</h1>
    <p class="subtitle">Gleap Analytics Dashboard</p>

    <div class="error-box" id="errorBox"></div>

    <a class="btn-google" id="loginBtn" href="#">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Sign in with Google
    </a>

    <p class="restriction"><svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="color:#64748b"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg> Only @supy.io accounts allowed</p>
  </div>

  <script>
    // Build the login URL preserving the `next` destination
    const params = new URLSearchParams(window.location.search);
    const next   = params.get('next') || '/';
    const error  = params.get('error');
    const email  = params.get('email');

    document.getElementById('loginBtn').href = `/api/auth/login?next=${encodeURIComponent(next)}`;

    if (error) {
      const box = document.getElementById('errorBox');
      box.classList.add('show');
      if (error === 'unauthorized') {
        box.textContent = `Access denied: ${email || 'unknown email'} is not a @supy.io account.`;
      } else if (error === 'token_failed') {
        box.textContent = 'Authentication failed. Please try again.';
      } else {
        box.textContent = 'Sign-in failed. Please try again.';
      }
    }
  </script>
</body>
</html>
