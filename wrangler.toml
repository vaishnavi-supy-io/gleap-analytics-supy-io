# ── Gleap Dashboard — Cloudflare Pages ───────────────────────────────────────
# Deploy to org account:
#   CLOUDFLARE_API_TOKEN=<token> CLOUDFLARE_ACCOUNT_ID=<org-account-id> \
#   npx wrangler pages deploy public --project-name gleap-dashboard
#
# account_id is intentionally omitted here — it is supplied at deploy time via
# the CLOUDFLARE_ACCOUNT_ID environment variable so no personal/org IDs are
# hardcoded in source control.
# ─────────────────────────────────────────────────────────────────────────────

name = "gleap-dashboard"
pages_build_output_dir = "public"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── Local dev secrets (wrangler pages dev) ────────────────────────────────────
# Copy .dev.vars.example → .dev.vars and fill in values.
# .dev.vars is gitignored and never committed.

# ── Production secrets (set once via CLI or CI) ───────────────────────────────
# npx wrangler pages secret put GLEAP_API_KEY       --project-name gleap-dashboard
# npx wrangler pages secret put OPENROUTER_KEY      --project-name gleap-dashboard
# npx wrangler pages secret put SESSION_SECRET      --project-name gleap-dashboard
# npx wrangler pages secret put GOOGLE_CLIENT_ID    --project-name gleap-dashboard
# npx wrangler pages secret put GOOGLE_CLIENT_SECRET --project-name gleap-dashboard
# npx wrangler pages secret put PROJECT_ID          --project-name gleap-dashboard
# npx wrangler pages secret put SLACK_WEBHOOK_URL   --project-name gleap-dashboard
